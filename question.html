<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作図問題 ― 円と接線</title>
<style>
  @media print {
    body { margin: 0; }
    .no-print { display: none; }
    .page-break { page-break-before: always; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #fff;
    color: #1a1a18;
    font-size: 15px;
    line-height: 1.75;
  }
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 40px 48px;
  }
  .sheet-header {
    border-bottom: 2px solid #378ADD;
    padding-bottom: 14px;
    margin-bottom: 32px;
  }
  .sheet-title {
    font-size: 20px;
    font-weight: 700;
    color: #042C53;
    margin-bottom: 8px;
  }
  .meta-row {
    display: flex;
    gap: 32px;
    font-size: 13px;
    color: #5F5E5A;
  }
  .meta-row span { display: flex; align-items: center; gap: 6px; }
  .meta-blank {
    display: inline-block;
    border-bottom: 1px solid #888;
    min-width: 120px;
    margin-left: 4px;
  }
  .instructions {
    background: #E6F1FB;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 32px;
    font-size: 13px;
    color: #042C53;
  }
  .instructions p { margin-bottom: 2px; }

  .problem {
    margin-bottom: 40px;
  }
  .problem-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
  }
  .problem-num {
    font-size: 17px;
    font-weight: 700;
    color: #0C447C;
    white-space: nowrap;
  }
  .tag {
    font-size: 12px;
    padding: 2px 9px;
    border-radius: 6px;
    font-weight: 600;
  }
  .tag-blue { background: #E6F1FB; color: #185FA5; }
  .tag-amber { background: #FAEEDA; color: #633806; }

  .problem-text {
    font-size: 14px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #F7F6F2;
    border-radius: 8px;
    border-left: 3px solid #378ADD;
  }
  .fig-area {
    margin: 0 0 12px;
  }
  .work-space {
    border: 1px solid #D3D1C7;
    border-radius: 8px;
    margin-top: 12px;
    background: #fff;
    position: relative;
  }
  .work-label {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 11px;
    color: #B4B2A9;
  }

  .divider { border: none; border-top: 1px solid #D3D1C7; margin: 40px 0; }

  .print-btn {
    display: inline-block;
    margin-bottom: 24px;
    padding: 8px 20px;
    background: #378ADD;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .print-btn:hover { background: #185FA5; }
</style>
</head>
<body>
<div class="page">

  <button class="print-btn no-print" onclick="window.print()">印刷 / PDFで保存</button>

  <div class="sheet-header">
    <div class="sheet-title">作図問題 ― 円と接線</div>
    <div class="meta-row">
      <span>氏名：<span class="meta-blank"></span></span>
      <span>組：<span class="meta-blank" style="min-width:60px"></span></span>
      <span>日付：<span class="meta-blank" style="min-width:80px"></span></span>
    </div>
  </div>

  <div class="instructions">
    <p>・コンパスと定規のみ使用可。分度器は使用不可。</p>
    <p>・作図の跡（補助線・円弧）は消さないこと。跡がないと正解と判断できません。</p>
    <p>・問2は発展問題です。解けなくても問1を完成させることを優先しましょう。</p>
  </div>

  <!-- 問1 -->
  <div class="problem">
    <div class="problem-head">
      <span class="problem-num">問1</span>
      <span class="tag tag-blue">円上の点からの接線</span>
    </div>
    <div class="problem-text">
      下の図で、円Oの円周上に点Pがある。点Pにおける円Oの接線を作図しなさい。
    </div>

    <div class="fig-area">
      <svg viewBox="0 0 600 260" width="100%" xmlns="http://www.w3.org/2000/svg">
        <!-- 作図スペース用グリッド（薄い点） -->
        <defs>
          <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="0.8" fill="#D3D1C7"/>
          </pattern>
        </defs>
        <rect x="0" y="0" width="600" height="260" fill="url(#dots)" rx="8"/>
        <!-- 円O -->
        <circle cx="240" cy="130" r="90" fill="white" stroke="#378ADD" stroke-width="1.8"/>
        <!-- 中心O -->
        <circle cx="240" cy="130" r="3.5" fill="#185FA5"/>
        <text x="248" y="126" font-size="14" fill="#0C447C" font-weight="600"
              font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">O</text>
        <!-- 点P（円周上、右上あたり: 240+90cos(-40°), 130+90sin(-40°) ≈ (309, 72)） -->
        <circle cx="309" cy="72" r="5" fill="#D85A30"/>
        <text x="317" y="68" font-size="14" fill="#993C1D" font-weight="600"
              font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">P</text>
        <!-- OP（薄い補助線） -->
        <line x1="240" y1="130" x2="309" y2="72" stroke="#B5D4F4" stroke-width="1" stroke-dasharray="5,4"/>
      </svg>
    </div>

    <div class="work-space" style="height:80px">
      <span class="work-label">手順メモ欄（任意）</span>
    </div>
  </div>

  <hr class="divider">

  <!-- 問2 -->
  <div class="problem">
    <div class="problem-head">
      <span class="problem-num">問2</span>
      <span class="tag tag-blue">円外の点からの接線</span>
      <span class="tag tag-amber">発展</span>
    </div>
    <div class="problem-text">
      下の図で、円Oの外部に点Pがある。点Pから円Oに引いた接線の接点をT₁、T₂とするとき、点T₁・T₂を作図しなさい。また、接線PT₁、PT₂を引きなさい。
    </div>

    <div class="fig-area">
      <svg viewBox="0 0 600 260" width="100%" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="600" height="260" fill="url(#dots)" rx="8"/>
        <!-- 円O -->
        <circle cx="200" cy="130" r="80" fill="white" stroke="#378ADD" stroke-width="1.8"/>
        <circle cx="200" cy="130" r="3.5" fill="#185FA5"/>
        <text x="208" y="126" font-size="14" fill="#0C447C" font-weight="600"
              font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">O</text>
        <!-- 点P（円外） -->
        <circle cx="520" cy="130" r="5" fill="#444441"/>
        <text x="528" y="126" font-size="14" fill="#444441" font-weight="600"
              font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif">P</text>
      </svg>
    </div>

    <div class="work-space" style="height:80px">
      <span class="work-label">手順メモ欄（任意）</span>
    </div>
  </div>

</div>
</body>
</html>
